# Visible name; slug stays "solar_brain" so existing installs and /data keep working.
name: Smart Home Energy
version: "0.7.0"
slug: solar_brain
description: Smart home energy management for Home Assistant (solar/PV optional)
url: url: https://github.com/Xinyin-0913/solar-brain-addon
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
homeassistant_api: true
# hassio_api triggers the Supervisor to inject SUPERVISOR_TOKEN into the
# container. homeassistant_api alone grants Core-proxy permission but no
# token, so the proxy is unusable without this. Role left at the default
# (least privilege) - we only read the HA Core API, never manage anything.
hassio_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:home-lightning-bolt
panel_title: Smart Home Energy
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Optional direct access to dashboard and REST API (ingress is used by default)
webui: "http://[HOST]:[PORT:8099]"
# NOTE: no home_assistant_url / home_assistant_token options - API access is
# provided automatically by the Supervisor (homeassistant_api: true above).
options:
  latitude: 0.0
  longitude: 0.0
  electricity_import_price_eur_per_kwh: 0.30
  feed_in_tariff_eur_per_kwh: 0.08
  system_cost_eur: 0.0
  installation_date: ""
  default_wattage_light: 9.0
  default_wattage_smart_plug: 1.0
  default_wattage_motion_sensor: 0.1
  openrouter_api_key: ""
  enable_ai: false
schema:
  latitude: float
  longitude: float
  electricity_import_price_eur_per_kwh: float
  feed_in_tariff_eur_per_kwh: float
  system_cost_eur: float
  installation_date: str?
  default_wattage_light: float
  default_wattage_smart_plug: float
  default_wattage_motion_sensor: float
  openrouter_api_key: password?
  enable_ai: bool
