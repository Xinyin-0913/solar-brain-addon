# Official Home Assistant Alpine base images, pinned to Alpine 3.21.
# Python is NOT included in these images - the Dockerfile installs
# python3 + pip via apk, so the build also works if the Supervisor
# falls back to its default base image.
build_from:
  amd64: ghcr.io/home-assistant/amd64-base:3.21
  aarch64: ghcr.io/home-assistant/aarch64-base:3.21
